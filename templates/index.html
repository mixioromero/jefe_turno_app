{% extends 'base.html' %}
{% block content %}
<section class="hero hero-mobile">
  <div>
    <h2>Acceso rápido</h2>
    <p>Abre un módulo, completa el formulario y guarda el registro desde el celular.</p>
  </div>
  <div class="hero-badges">
    <span class="badge">📱 Responsive</span>
    <span class="badge">🗂️ Excel</span>
    <span class="badge">⚡ Rápido</span>
  </div>
</section>

<section class="grid mobile-grid">
  {% for module in modules %}
  <a class="card module-card" href="{{ url_for('form_sheet', sheet_name=module.sheet_name) }}">
    <div class="module-head">
      <div class="module-icon">{{ module.icon }}</div>
      <div class="module-count">{{ module.count }}</div>
    </div>
    <h3>{{ module.title }}</h3>
    <span class="card-link">Abrir módulo</span>
  </a>
  {% endfor %}
</section>
{% endblock %}
